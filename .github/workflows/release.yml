name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v1.0.0"
        required: true
        type: string

jobs:
  validate-release:
    name: Validate Release
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hr_daily
      NEXT_TELEMETRY_DISABLED: "1"
      OPENAI_API_KEY: release-placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build app
        run: npm run build

      - name: Docker build
        run: docker compose build

      - name: Create release artifact
        run: |
          mkdir -p release
          tar \
            --exclude=.git \
            --exclude=.next \
            --exclude=node_modules \
            --exclude=release \
            -czf "release/hr-daily-ai-${{ inputs.version }}.tar.gz" .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: "hr-daily-ai-${{ inputs.version }}"
          path: "release/hr-daily-ai-${{ inputs.version }}.tar.gz"
